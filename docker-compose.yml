services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lumi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: Lumilighting@123!
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: lumi_redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    networks:
      - medusa_network

  # Medusa Server
  medusa:
    build: ./lumilightingco-medusa
    container_name: lumi_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9001:9000"
      - "5174:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://lumi:Lumilighting@123!@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./lumilightingco-medusa/apps/backend/.env
    volumes:
      - ./lumilightingco-medusa:/server
      - /server/node_modules
      - /server/apps/backend/node_modules
    networks:
      - medusa_network

  # Storefront
  storefront:
    build:
      context: ./lumilightingco
      dockerfile: Dockerfile
    container_name: lumi_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "3000:3000"
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      - MEDUSA_BACKEND_URL=http://medusa:9000
    env_file:
      - ./lumilightingco/.env.local
    networks:
      - medusa_network

  # Admin Analytics Dashboard (CEO Portal)
  admin-dashboard:
    build: ./lumilightingco-medusa
    container_name: lumi_admin_dashboard
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://lumi:Lumilighting@123!@postgres:5432/medusa-store
      - HOSTNAME=0.0.0.0
    env_file:
      - ./lumilightingco-medusa/apps/admin-dashboard/.env
    volumes:
      - ./lumilightingco-medusa:/server
      - /server/node_modules
      - /server/apps/admin-dashboard/node_modules
    command: pnpm --filter admin-dashboard dev
    networks:
      - medusa_network

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: lumi_meilisearch
    restart: unless-stopped
    ports:
      - "7701:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=your_meilisearch_api_key
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - medusa_network

  # Ngrok Tunnel for M-Pesa callbacks
  ngrok:
    image: ngrok/ngrok:latest
    container_name: lumi_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "storefront:3000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4045:4040"
    depends_on:
      - storefront
    networks:
      - medusa_network

volumes:
  postgres_data:
  meilisearch_data:

networks:
  medusa_network:
    driver: bridge
