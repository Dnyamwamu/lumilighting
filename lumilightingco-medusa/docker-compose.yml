services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lumi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: lumi_redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build: .
    container_name: lumi_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9001:9000"
      - "5174:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - apps/backend/.env
    volumes:
      - .:/server
      - /server/node_modules
      - /server/apps/backend/node_modules
    networks:
      - medusa_network

  # Storefront
  # This service runs the custom Next.js Storefront
  storefront:
    build:
      context: ../lumilightingco
      dockerfile: Dockerfile
    container_name: lumi_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "3000:3000"
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      - MEDUSA_BACKEND_URL=http://medusa:9000
    env_file:
      - ../lumilightingco/.env.local
    networks:
      - medusa_network

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: lumi_meilisearch
    restart: unless-stopped
    ports:
      - "7701:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=your_meilisearch_api_key
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - medusa_network

volumes:
  postgres_data:
  meilisearch_data:

networks:
  medusa_network:
    driver: bridge

